name: Build WinBoat

permissions:
    contents: read

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            build_type:
                description: "Build type"
                required: true
                default: "all"
                type: choice
                options:
                    - all
                    - linux-only
                    - guest-server-only

jobs:
    build:
        if: >-
            github.event_name == 'push' ||
            github.event_name == 'pull_request' ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type != 'guest-server-only')
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: ubuntu-22.04
                      arch: x86_64
                      unpacked_dir: linux-unpacked
                    - runner: ubuntu-24.04-arm
                      arch: arm64
                      unpacked_dir: linux-arm64-unpacked
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Update USB IDs database
              shell: bash
              run: |
                  usb_ids_tmp="${RUNNER_TEMP}/usb.ids"
                  if curl --fail --location --show-error --silent --retry 3 \
                      --output "${usb_ids_tmp}" https://www.linux-usb.org/usb.ids &&
                      grep -Fq "List of USB ID's" "${usb_ids_tmp}"; then
                      mv "${usb_ids_tmp}" data/usb.ids
                  else
                      echo "::warning::Could not refresh usb.ids; using tracked fallback."
                  fi
                  test -s data/usb.ids
            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libcrypt1 libudev-dev libusb-1.0-0-dev
            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "stable"
                  cache-dependency-path: |
                      guest_server/go.sum
                      tools/guest-port-forward/go.mod
            - name: Install dependencies
              run: bun ci
            - name: Verify source and dependencies
              run: |
                  bash -n build-guest-server.sh scripts/*.sh
                  bun run verify
            - name: Build guest server and app
              run: bun run build:linux-gs
              env:
                  ELECTRON_BUILDER_COMPRESSION_LEVEL: 5
            - name: Prepare architecture artifacts
              run: |
                  test -d "dist/${{ matrix.unpacked_dir }}"
                  cd dist
                  zip -r "winboat-${{ matrix.arch }}-linux-unpacked.zip" "${{ matrix.unpacked_dir }}"
                  cp "${{ matrix.unpacked_dir }}/resources/guest_server/winboat_guest_server.zip" "winboat-${{ matrix.arch }}-guest_server.zip"
            - name: Upload architecture bundle
              uses: actions/upload-artifact@v7
              with:
                  name: winboat-${{ matrix.arch }}
                  path: |
                      dist/*.AppImage
                      dist/*.deb
                      dist/*.rpm
                      dist/*.tar.bz2
                      dist/latest-linux*.yml
                      dist/winboat-${{ matrix.arch }}-linux-unpacked.zip
                      dist/winboat-${{ matrix.arch }}-guest_server.zip
                  if-no-files-found: error

    guest-server-only:
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'guest-server-only'
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "stable"
                  cache-dependency-path: guest_server/go.sum
            - name: Verify guest server
              working-directory: guest_server
              run: GOOS=windows GOARCH=amd64 go vet ./...
            - name: Build guest server
              run: bash build-guest-server.sh
            - name: Upload guest server artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: guest-server-amd64
                  path: |
                      guest_server/winboat_guest_server.exe
                      guest_server/winboat_guest_server.zip
                  if-no-files-found: error

    release:
        if: startsWith(github.ref, 'refs/tags/')
        needs: build
        runs-on: ubuntu-22.04
        permissions:
            contents: write
        steps:
            - name: Download architecture bundles
              uses: actions/download-artifact@v7
              with:
                  pattern: winboat-*
                  path: release-assets
                  merge-multiple: true
            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  files: release-assets/*
                  draft: false
                  prerelease: false
                  generate_release_notes: true
